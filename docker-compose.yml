services:

  postgres:
    image: postgres:16
    container_name: order-postgres
    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:latest
    container_name: order-kafka
    restart: always

    ports:
      - "${KAFKA_PORT}:9094"

    environment:
      KAFKA_ENABLE_KRAFT: yes
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_CFG_LISTENERS: PLAINTEXT://:9094,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

      ALLOW_PLAINTEXT_LISTENER: yes

  app:
    build: .
    container_name: order-api-engine

    depends_on:
      - postgres
      - kafka

    ports:
      - "${APP_PORT}:8081"

    environment:
      ORDER_API_ENGINE_PORT: ${APP_PORT}

      ORDER_API_ENGINE_POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      ORDER_API_ENGINE_POSTGRES_USERNAME: ${POSTGRES_USER}
      ORDER_API_ENGINE_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      ORDER_API_ENGINE_KAFKA_HOST: kafka
      ORDER_API_ENGINE_KAFKA_PORT: 9094

volumes:
  postgres_data: